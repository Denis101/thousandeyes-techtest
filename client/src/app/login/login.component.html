<div>
  <h2>Login</h2>
  <form name="form" (ngSubmit)="f.form.valid && submitLogin()" #f="ngForm" novalidate>
      <div class="form-group">
          <label for="id">ID</label>
          <input type="text" class="form-control" name="id" [(ngModel)]="login.id" #username="ngModel" required />
      </div>
      <div class="form-group">
          <label for="username">Username</label>
          <input type="text" class="form-control" name="username" [(ngModel)]="login.username" #username="ngModel" required />
      </div>
      <div class="form-group">
          <label for="password">Password</label>
          <input type="password" class="form-control" name="password" [(ngModel)]="login.password" #password="ngModel" required />
      </div>
      <div class="form-group">
          <button class="btn btn-primary">Login</button>
      </div>
  </form>
</div>
